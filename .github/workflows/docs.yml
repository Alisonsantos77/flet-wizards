name: regenerate-docs

# Dispara em commits ao main que alterem src/wizards/.
# workflow_dispatch permite trigger manual via aba Actions.
# Não há loop infinito: o auto-commit só toca docs/ e README.md,
# que não estão na lista de paths do trigger.

on:
  push:
    branches: [main]
    paths:
      - 'src/wizards/**'
      - 'pipeline/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: regenerate-docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies (with pipeline extras)
        run: uv sync --extra pipeline

      - name: Run cocoindex pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: uv run python pipeline/cocoindex_pipeline.py

      - name: Commit and push regenerated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n "$(git status --porcelain docs README.md)" ]]; then
            git add docs README.md
            git commit -m "docs: regenerate from cocoindex pipeline"
            git push
          else
            echo "Sem alterações em docs/ ou README.md — nada a commitar."
          fi
